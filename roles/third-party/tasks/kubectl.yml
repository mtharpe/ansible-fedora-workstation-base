---
- name: Probe Kubernetes yum repo
  ansible.builtin.uri:
    url: "https://pkgs.k8s.io/core:/stable:/{{ kubectl_channel | default('v1.31') }}/rpm/repodata/repomd.xml"
    method: HEAD
    status_code: [200, 301, 302]
  register: kubectl_probe
  failed_when: false
  changed_when: false
  tags: [third_party, kubectl]

- name: Note unreachable Kubernetes repo
  ansible.builtin.debug:
    msg: "Kubernetes yum repo unreachable — skipping."
  when: kubectl_probe.status | default(0) != 200
  tags: [third_party, kubectl]

- name: Add Kubernetes yum repository
  ansible.builtin.yum_repository:
    name: kubernetes
    description: Kubernetes
    baseurl: "https://pkgs.k8s.io/core:/stable:/{{ kubectl_channel | default('v1.31') }}/rpm/"
    gpgcheck: true
    gpgkey: "https://pkgs.k8s.io/core:/stable:/{{ kubectl_channel | default('v1.31') }}/rpm/repodata/repomd.xml.key"
    enabled: true
  become: true
  when: kubectl_probe.status | default(0) == 200
  tags: [third_party, kubectl]

- name: Install kubectl
  ansible.builtin.dnf:
    name: kubectl
    state: present
  become: true
  when: kubectl_probe.status | default(0) == 200
  tags: [third_party, kubectl]
