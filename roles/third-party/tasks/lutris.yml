---
- name: Check for Wine
  ansible.builtin.stat:
    path: /usr/bin/wine
  register: wine_installed
  tags: [third_party, lutris]

- name: Check for Lutris
  ansible.builtin.stat:
    path: /usr/bin/lutris
  register: lutris_installed
  tags: [third_party, lutris]

- name: Install Wine
  ansible.builtin.package:
    name: wine
    state: present
  when: not wine_installed.stat.exists
  become: true
  tags: [third_party, lutris]

- name: Install Lutris
  ansible.builtin.package:
    name: lutris
    state: present
  when: not lutris_installed.stat.exists
  become: true
  tags: [third_party, lutris]

- name: Install Vulkan Loader
  ansible.builtin.package:
    name:
      - vulkan-loader
      - vulkan-loader.i686
      - vulkan-tools
      - glx-utils
    state: present
  when: not lutris_installed.stat.exists
  become: true
  tags: [third_party, lutris]

- name: Install missing 32/64 bit libraries for Lutris
  ansible.builtin.package:
    name:
      - freetype
      - freetype.i686
      - gnutls
      - gnutls.i686
      - gnutls-devel
      - gnutls-devel.i686
      - openldap
      - openldap.i686
      - openldap-devel
      - openldap-devel.i686
      - libgpg-error
      - libgpg-error.i686
      - sqlite2.i686
      - sqlite2.x86_64
    state: present
  when: not lutris_installed.stat.exists
  become: true
  tags: [third_party, lutris]

# Lutris's installer scripts shell out to these for archive extraction, MIDI
# soundfonts, MIME sniffing, and the optional certutil-based Battle.net cert
# import. Fedora's `python` already points at python3, so no python-is-python3
# equivalent is needed here.
- name: Install Lutris runtime helpers (extractors, soundfont, MIME, certutil)
  ansible.builtin.package:
    name:
      - cabextract
      - fluid-soundfont-gs
      - nss-tools
      - p7zip
      - p7zip-plugins
      - python3-lxml
      - python3-magic
    state: present
  become: true
  tags: [third_party, lutris]

# Battle.net's launcher and most Windows games shipped through Lutris are
# 32-bit; Wine needs the matching .i686 copies of these libs or installs fail
# at runtime. This is the i686 set we identified working with Battle.net.
- name: Install 32-bit (i686) Wine/Battle.net runtime libraries
  ansible.builtin.package:
    name:
      - alsa-lib.i686
      - dbus-libs.i686
      - libcurl.i686
      - libxml2.i686
      - mesa-libGL.i686
      - nss.i686
      - SDL2.i686
      - sqlite-libs.i686
    state: present
  become: true
  failed_when: false
  tags: [third_party, lutris]
