---
- name: Check if Zoom is already installed
  ansible.builtin.command:
    cmd: rpm -q zoom
  register: zoom_installed
  failed_when: false
  changed_when: false
  tags: [third_party, zoom]

- name: Probe Zoom RPM
  ansible.builtin.uri:
    url: https://zoom.us/client/latest/zoom_x86_64.rpm
    method: HEAD
    status_code: [200, 301, 302]
  register: zoom_probe
  failed_when: false
  changed_when: false
  when: zoom_installed.rc != 0
  tags: [third_party, zoom]

- name: Note unreachable Zoom RPM
  ansible.builtin.debug:
    msg: "Zoom RPM unreachable — skipping."
  when:
    - zoom_installed.rc != 0
    - zoom_probe.status | default(0) != 200
  tags: [third_party, zoom]

- name: Install Zoom RPM
  ansible.builtin.dnf:
    name: https://zoom.us/client/latest/zoom_x86_64.rpm
    disable_gpg_check: true
    state: present
  become: true
  when:
    - zoom_installed.rc != 0
    - zoom_probe.status | default(0) == 200
  tags: [third_party, zoom]
