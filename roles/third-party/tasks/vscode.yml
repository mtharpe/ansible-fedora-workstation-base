---
- name: Probe VSCode yum repo
  ansible.builtin.uri:
    url: https://packages.microsoft.com/yumrepos/vscode/repodata/repomd.xml
    method: HEAD
    status_code: [200, 301, 302]
  register: vscode_probe
  failed_when: false
  changed_when: false
  tags: [third_party, vscode]

- name: Note unreachable VSCode repo
  ansible.builtin.debug:
    msg: "VSCode yum repo unreachable — skipping."
  when: vscode_probe.status | default(0) != 200
  tags: [third_party, vscode]

- name: Check for VSCode Repo
  ansible.builtin.stat:
    path: /etc/yum.repos.d/vscode.repo
  register: fedora_vscode_installed
  when: vscode_probe.status | default(0) == 200
  tags: [third_party, vscode]

- name: Import Microsoft GPG key
  ansible.builtin.rpm_key:
    state: present
    key: https://packages.microsoft.com/keys/microsoft.asc
  become: true
  when: vscode_probe.status | default(0) == 200
  tags: [third_party, vscode]

- name: Add VSCode Repo
  ansible.builtin.yum_repository:
    name: code
    description: Visual Studio Code
    file: vscode
    baseurl: https://packages.microsoft.com/yumrepos/vscode
    gpgkey: https://packages.microsoft.com/keys/microsoft.asc
    gpgcheck: false
  when:
    - vscode_probe.status | default(0) == 200
    - not (fedora_vscode_installed.stat.exists | default(false))
  become: true
  tags: [third_party, vscode]

- name: Install VSCode
  ansible.builtin.package:
    name: code
    state: present
  become: true
  when: vscode_probe.status | default(0) == 200
  tags: [third_party, vscode]
