---
# Install extra packages
- name: Install base packages
  ansible.builtin.dnf:
    name:
      - direnv
      - fail2ban
      - ansible
      - ansible-lint
      - arpwatch
      - autoconf
      - autofs
      - automake
      - cmake
      - firewalld
      - firewalld-filesystem
      - golang
      - golang-godoc
      - golang-gotype
      - gh
      - htop
      - iotop
      - jq
      - lshw
      - lsscsi
      - nfs-utils
      - ngrep
      - nmap
      - nmon
      - npm
      - speedtest-cli
      - sysstat
      - tmux
      - transmission
      - neovim
      - psutils
      - python3-psutil
      - python3-pip
      - python3-termcolor
      - unzip
      - alacritty
      - vlc
      - util-linux
      - nextcloud-client
      - gnome-extensions-app
    state: present

# HashiCorp packages — only attempted when the upstream rpm repo published
# artifacts for the running Fedora release (probed in repos.yml).
- name: Install HashiCorp packages
  ansible.builtin.dnf:
    name:
      - terraform
      - vault
      - consul
      - nomad
      - packer
    state: present
  when: common_hashicorp_repo_available | default(false)

# 1Password — only attempted when the upstream rpm repo is reachable.
- name: Install 1Password
  ansible.builtin.dnf:
    name: 1password
    state: present
  when: common_onepassword_repo_available | default(false)

# Multimedia / codecs — only meaningful on a real desktop and only when
# RPM Fusion (free + nonfree) is available for the running Fedora release.
- name: Configure multimedia codecs
  when:
    - not is_container | default(false)
    - common_rpmfusion_free_available | default(false)
    - common_rpmfusion_nonfree_available | default(false)
  block:
    # Swap ffmpeg-free with full ffmpeg (only when ffmpeg-free is still installed)
    - name: Check whether ffmpeg-free is installed
      ansible.builtin.command: rpm -q ffmpeg-free
      register: common_ffmpeg_free_check
      changed_when: false
      failed_when: false

    - name: Swap ffmpeg-free with ffmpeg
      ansible.builtin.command:
        cmd: dnf swap 'ffmpeg-free' 'ffmpeg' --allowerasing -y
      become: true
      when: common_ffmpeg_free_check.rc == 0
      changed_when: true

    # Upgrade multimedia group with specific options (idempotent in dnf; suppress changed flag)
    - name: Upgrade @multimedia without weak deps and exclude PackageKit-gstreamer-plugin
      ansible.builtin.command:
        cmd: dnf upgrade @multimedia --setopt=install_weak_deps=False --exclude=PackageKit-gstreamer-plugin -y
      become: true
      register: common_multimedia_upgrade_result
      changed_when: "'Upgraded:' in common_multimedia_upgrade_result.stdout or 'Installed:' in common_multimedia_upgrade_result.stdout"
      failed_when: false   # @multimedia group only present once RPM Fusion is enabled

    # Install ffmpeg libraries and VA-API utilities
    - name: Install ffmpeg-libs and VA-API packages
      ansible.builtin.dnf:
        name:
          - ffmpeg-libs
          - libva
          - libva-utils
        state: present
      become: true

    # Install OpenH264 and related plugins
    - name: Install OpenH264 codecs and plugins
      ansible.builtin.dnf:
        name:
          - openh264
          - gstreamer1-plugin-openh264
          - mozilla-openh264
        state: present
      become: true

    # Enable fedora-cisco-openh264 repository (idempotent via ini_file)
    - name: Enable fedora-cisco-openh264 repository
      community.general.ini_file:
        path: /etc/yum.repos.d/fedora-cisco-openh264.repo
        section: fedora-cisco-openh264
        option: enabled
        value: '1'
        mode: '0644'
      become: true
      failed_when: false   # repo file may be absent on minimal images

# Install molecule via pipx so it gets its own ansible-core in an isolated
# venv. Avoids conflicting with the dnf-installed `ansible` package the user
# needed to bootstrap this playbook. Skipped in containers.
- name: Ensure pipx is installed
  ansible.builtin.dnf:
    name: pipx
    state: present
  become: true
  when: not is_container | default(false)

- name: Install molecule via pipx
  community.general.pipx:
    name: molecule
    state: install
  become: true
  become_user: "{{ local_user }}"
  when: not is_container | default(false)

- name: Inject molecule-podman driver into the molecule pipx env
  community.general.pipx:
    name: molecule
    state: inject
    inject_packages:
      - molecule-podman
  become: true
  become_user: "{{ local_user }}"
  when: not is_container | default(false)

- name: Ensure pipx PATH is set up for the user
  ansible.builtin.command:
    cmd: pipx ensurepath
  become: true
  become_user: "{{ local_user }}"
  changed_when: false
  when: not is_container | default(false)

# Install podman only if docker is not requested
- name: Install podman if docker is not enabled
  ansible.builtin.dnf:
    name: podman
    state: present
  when: not install_docker | default(false)

# Install extra fonts
- name: Install extra fonts
  ansible.builtin.dnf:
    name:
      - adobe-source-code-pro-fonts
      - dejavu-sans-fonts
      - dejavu-sans-mono-fonts
      - dejavu-serif-fonts
      - gnu-free-fonts-common
      - gnu-free-mono-fonts
      - gnu-free-sans-fonts
      - gnu-free-serif-fonts
      - levien-inconsolata-fonts
      - liberation-fonts-common
      - liberation-mono-fonts
      - liberation-sans-fonts
      - liberation-serif-fonts
      - msimonson-anonymouspro-fonts
      - overpass-fonts
      - terminus-fonts
    state: present

# Optionally install a Nerd Font (FiraCode) for icons (starship, prompts)
- name: Check if FiraCode Nerd Font is already installed
  ansible.builtin.command:
    cmd: fc-list | grep -i "Fira Code"
  register: common_firacode_fonts
  failed_when: false
  changed_when: false
  when: install_nerd_font | default(false)

- name: Download FiraCode Nerd Font zip
  ansible.builtin.get_url:
    url: "https://github.com/ryanoasis/nerd-fonts/releases/latest/download/FiraCode.zip"
    dest: /tmp/FiraCode.zip
    mode: '0644'
  when:
    - install_nerd_font | default(false)
    - common_firacode_fonts.rc != 0

- name: Create nerd fonts directory
  ansible.builtin.file:
    path: /usr/local/share/fonts/nerdfonts
    state: directory
    owner: root
    group: root
    mode: '0755'
  become: true
  when:
    - install_nerd_font | default(false)
    - common_firacode_fonts.rc != 0

- name: Unarchive FiraCode Nerd Font
  ansible.builtin.unarchive:
    src: /tmp/FiraCode.zip
    dest: /usr/local/share/fonts/nerdfonts
    remote_src: true
  become: true
  register: common_firacode_unarchive
  when:
    - install_nerd_font | default(false)
    - common_firacode_fonts.rc != 0

- name: Refresh font cache
  ansible.builtin.command:
    cmd: fc-cache -f -v
  become: true
  when:
    - install_nerd_font | default(false)
    - common_firacode_unarchive.changed | default(false)
  changed_when: true

# Uninstall unwanted apps
- name: Uninstall junk apps
  ansible.builtin.dnf:
    name:
      - firefox
      - gnome-calendar
      - gnome-contacts
      - gnome-maps
      - rhythmbox
      - totem
      - gnome-tour
      - gnome-abrt
      - gnome-logs
    allowerasing: true
    state: absent
