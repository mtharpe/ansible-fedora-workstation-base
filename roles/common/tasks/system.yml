---
- name: Enable net.ipv4.ip_forward
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_file: /etc/sysctl.d/99-ansible.conf
    reload: true

- name: Set fs.inotify.max_user_watches to 524288
  ansible.posix.sysctl:
    name: fs.inotify.max_user_watches
    value: "524288"
    sysctl_file: /etc/sysctl.d/99-ansible.conf
    reload: true
  when: install_vscode | default(false)

- name: Allow wheel group to sudo without a password
  ansible.builtin.lineinfile:
    dest: /etc/sudoers
    state: present
    regexp: ^%wheel
    line: "%wheel ALL=(ALL) NOPASSWD: ALL"
    validate: visudo -cf %s

# Firewalld: install and configure a sensible desktop firewall
# Skipped in containers — firewalld requires netfilter access not available in unprivileged containers.
- name: Configure firewalld
  when: not is_container | default(false)
  block:
    - name: Ensure firewalld is installed
      ansible.builtin.dnf:
        name: firewalld
        state: present
      become: true

    - name: Ensure firewalld is enabled and running
      ansible.builtin.service:
        name: firewalld
        enabled: true
        state: started
      become: true

    - name: Get current default firewalld zone
      ansible.builtin.command:
        cmd: firewall-cmd --get-default-zone
      register: fw_default
      changed_when: false
      failed_when: false
      become: true

    - name: Set default firewalld zone if different
      ansible.builtin.command:
        cmd: firewall-cmd --set-default-zone={{ firewalld_default_zone | default('public') }}
      when: fw_default.stdout is defined and fw_default.stdout != (firewalld_default_zone | default('public'))
      changed_when: fw_default.stdout is defined and fw_default.stdout != (firewalld_default_zone | default('public'))
      become: true

    - name: Ensure common desktop services are allowed
      ansible.posix.firewalld:
        zone: "{{ firewalld_default_zone | default('public') }}"
        service: "{{ item }}"
        permanent: true
        immediate: true
        state: enabled
      loop: "{{ firewalld_allowed_services | default(['ssh', 'mdns', 'dhcpv6-client']) }}"
      become: true

    - name: Ensure configured ports are allowed
      ansible.posix.firewalld:
        zone: "{{ firewalld_default_zone | default('public') }}"
        port: "{{ item }}"
        permanent: true
        immediate: true
        state: enabled
      loop: "{{ firewalld_allowed_ports | default([]) }}"
      when: firewalld_allowed_ports is defined and firewalld_allowed_ports | length > 0
      become: true

# Configure git user settings
- name: Ensure .gitconfig exists in user home directory
  ansible.builtin.file:
    path: "/home/{{ local_user }}/.gitconfig"
    state: touch
    owner: "{{ local_user }}"
    group: "{{ local_user }}"
    mode: '0644'
    modification_time: preserve
    access_time: preserve
  become: true

- name: Configure git user.name
  community.general.git_config:
    scope: global
    name: user.name
    value: "Michael Tharpe"
  become: true
  become_user: "{{ local_user }}"

- name: Configure git user.email
  community.general.git_config:
    scope: global
    name: user.email
    value: "mtharpe@users.noreply.github.com"
  become: true
  become_user: "{{ local_user }}"
